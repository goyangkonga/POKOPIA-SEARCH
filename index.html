<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>포고피아 도감 웹사이트</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background:#f1f3f5; color:#111; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
    .top { background:#fff; border-radius: 28px; padding: 20px; box-shadow: 0 2px 14px rgba(0,0,0,.05); }
    h1 { margin:0 0 8px; font-size: 30px; }
    .sub { margin:0 0 16px; color:#666; }
    .controls { display:grid; grid-template-columns: 1fr auto; gap:10px; }
    input { width:100%; height:52px; border:1px solid #d6d6d6; border-radius:18px; padding:0 16px; font-size:18px; }
    button { height:52px; border:0; border-radius:18px; padding:0 18px; background:#111; color:#fff; font-size:16px; cursor:pointer; }
    .meta { margin-top:10px; color:#666; font-size:14px; }
    .card-wrap { margin-top:22px; display:flex; justify-content:center; }
    .card { width:min(100%, 360px); background:#fff; box-shadow:0 2px 14px rgba(0,0,0,.05); }
    .cell { border-bottom:1px dashed #777; padding:12px; text-align:center; background:#fff; }
    .cell.head { background:#fde8e8; }
    .number { font-size:32px; font-weight:700; }
    .name { font-size:34px; font-weight:700; word-break:keep-all; }
    .sprite-box { min-height:240px; display:flex; align-items:center; justify-content:center; background:#f7f7f7; }
    .sprite-box img { max-width: 220px; max-height: 220px; object-fit:contain; }
    .tone { font-size:28px; }
    .tags { line-height:1.85; font-size:18px; white-space:pre-line; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; }
    .grid2 > div { border-bottom:1px dashed #777; padding:12px; text-align:center; min-height:62px; display:flex; align-items:center; justify-content:center; }
    .grid2 > div:nth-child(odd) { border-right:1px dashed #777; }
    .action { font-size:26px; word-break:keep-all; }
    .habimg { aspect-ratio:1/1; background:#f7f7f7; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .habimg img { width:100%; height:100%; object-fit:cover; }
    .habtxt { font-size:24px; line-height:1.35; padding:18px 10px !important; word-break:keep-all; }
    .empty { color:#aaa; }
    .hint { margin-top:28px; text-align:center; color:#777; }
    @media (max-width:520px) {
      .wrap { padding: 14px; }
      h1 { font-size:24px; }
      .number { font-size:26px; }
      .name { font-size:28px; }
      .tone { font-size:24px; }
      .action { font-size:20px; }
      .habtxt { font-size:18px; }
      .tags { font-size:16px; }
      .controls { grid-template-columns:1fr; }
      button { width:100%; }
    }
  </style>
</head>

    const searchEl = document.getElementById('search');
    const metaEl = document.getElementById('meta');
    const resultEl = document.getElementById('result');
    const hintEl = document.getElementById('hint');
    const sampleBtn = document.getElementById('sampleBtn');

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderCard(item) {
      const tags = item.tags.length
        ? item.tags.map(tag => `<div>${escapeHtml(tag)}</div>`).join('')
        : `<div class="empty">태그 없음</div>`;

      const actions = [item.actions[0] || '-', item.actions[1] || '-'];
      const habitats = [item.habitats[0] || '-', item.habitats[1] || '-'];
      const habImgs = [item.habitatImages[0] || '', item.habitatImages[1] || ''];

      return `
        <div class="card">
          <div class="cell head"><div class="number">${escapeHtml(item.number)}</div></div>
          <div class="cell head"><div class="name">${escapeHtml(item.name)}</div></div>
          <div class="cell">
            <div class="sprite-box">
              ${item.image ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" />` : `<div class="empty">포켓몬 이미지 없음</div>`}
            </div>
          </div>
          <div class="cell"><div class="tone">${escapeHtml(item.tone || '-')}</div></div>
          <div class="cell"><div class="tags">${tags}</div></div>
          <div class="grid2">
            <div class="action">${escapeHtml(actions[0])}</div>
            <div class="action">${escapeHtml(actions[1])}</div>
          </div>
          <div class="grid2">
            <div><div class="habimg">${habImgs[0] ? `<img src="${escapeHtml(habImgs[0])}" alt="habitat 1" />` : `<span class="empty">서식지 이미지 1</span>`}</div></div>
            <div><div class="habimg">${habImgs[1] ? `<img src="${escapeHtml(habImgs[1])}" alt="habitat 2" />` : `<span class="empty">서식지 이미지 2</span>`}</div></div>
          </div>
          <div class="grid2">
            <div class="habtxt">${escapeHtml(habitats[0])}</div>
            <div class="habtxt">${escapeHtml(habitats[1])}</div>
          </div>
        </div>
      `;
    }

    function runSearch(q) {
      const query = q.trim().toLowerCase();
      if (!query) {
        resultEl.innerHTML = '';
        hintEl.textContent = '검색창에 포켓몬 이름을 입력하면 1마리를 세로형 카드로 보여줄게.';
        metaEl.textContent = `총 ${DATA.length}마리 연결됨`;
        return;
      }

      const match = DATA.find(item => item.search.includes(query) || item.number.toLowerCase() === query || item.rawName.toLowerCase() === query);
      if (!match) {
        resultEl.innerHTML = '';
        hintEl.textContent = '검색 결과 없음. 이름이나 번호를 다시 입력해봐.';
        metaEl.textContent = `총 ${DATA.length}마리 연결됨`;
        return;
      }

      resultEl.innerHTML = renderCard(match);
      hintEl.textContent = '';
      metaEl.textContent = `총 ${DATA.length}마리 연결됨 · 현재 표시: ${match.number} ${match.rawName || ''}`;
    }

    searchEl.addEventListener('input', (e) => runSearch(e.target.value));
    sampleBtn.addEventListener('click', () => {
      searchEl.value = '이상해씨';
      runSearch('이상해씨');
    });

    metaEl.textContent = `총 ${DATA.length}마리 연결됨`;
  </script>
